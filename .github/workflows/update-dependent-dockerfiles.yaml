---
name: Cascade • Update Dependent Dockerfiles

on:
  repository_dispatch:
    types: [update-dependent-dockerfiles]

permissions:
  contents: write        # commit + push
  pull-requests: write   # open PRs
  id-token: none

env:
  # Optional: restrict which senders may trigger this workflow for safety
  ALLOWED_SENDERS: SecurityUniversalOrg,bkaiserinfosec  # comma-separated org(s) or user(s)

jobs:
  update:
    runs-on: federal
    steps:
      - name: Validate sender
        id: guard
        uses: SecurityUniversalOrg/platform-actions/actions/gh-validate-repo-dispatch-sender@v1
        with:
          allowed_senders: SecurityUniversalOrg,bkaiserinfosec

      - name: Extract payload
        id: in
        uses: SecurityUniversalOrg/platform-actions/actions/gh-extract-repo-dispatch-payload@v1

      - name: Process each target repo (one PR per repo)
        id: process-repos
        uses: SecurityUniversalOrg/platform-actions/actions/docker-push-update-dependent-files@v1
        with:
          gh_token: ${{ secrets.DEPENDENT_REPO_RW_TOKEN }}
          base_name: ${{ steps.in.outputs.base_name }}
          old_tag: ${{ steps.in.outputs.old_tag }}
          new_tag: ${{ steps.in.outputs.new_tag }}
          subset: ${{ steps.in.outputs.subset }}
