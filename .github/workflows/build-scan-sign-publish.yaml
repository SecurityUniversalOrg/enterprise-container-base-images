      - name: Commit & open PR (one PR for all)
        id: open-pr
        uses: SecurityUniversalOrg/ghe-actions/actions/gh-open-pr@v1
        with:
          gh_token: ${{ secrets.DEPENDENT_REPO_RW_TOKEN }}
          feature_branch: "chore/matrix-bump"
