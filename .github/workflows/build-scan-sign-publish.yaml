name: Build • Scan • Sign • Publish

on:
  push:
    branches: [main]
    paths:
      - images/**
      - matrix.yaml
  pull_request:
    paths:
      - images/**
      - matrix.yaml
  workflow_dispatch:
    inputs:
      subset:
        description: "Comma-separated image names to build (optional; must match names in matrix.yaml)"
        required: false
        type: string
        default: ""
      repo:
        description: "Target registry repo prefix, e.g. docker.io/kaiserbros (leave blank to auto-resolve)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write   # required for cosign keyless
  packages: read

env:
  DOCKERHUB_REGISTRY: docker.io
  COSIGN_YES: "true"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve repo prefix
        id: repo
        run: |
          set -euo pipefail
          INPUT_REPO="${{ inputs.repo }}"
          if [ -n "$INPUT_REPO" ]; then
            echo "repo=$INPUT_REPO" >> "$GITHUB_OUTPUT"
          else
            # Try dockerhub_namespace from matrix.yaml; else default to docker.io/<owner>
            python3 - <<'PY'
import yaml, os
m = yaml.safe_load(open('matrix.yaml'))
ns = m.get('dockerhub_namespace')
owner = os.environ.get('GITHUB_REPOSITORY_OWNER', '')
repo = f"docker.io/{ns}" if ns else f"docker.io/{owner}"
open(os.environ['GITHUB_OUTPUT'],'a').write(f"repo={repo}\n")
PY
          fi

      - name: Build matrix (optionally filter by subset)
        id: out
        run: |
          set -euo pipefail
          python3 - <<'PY'
import os, json, yaml
m = yaml.safe_load(open('matrix.yaml'))
subset = os.getenv('SUBSET','').strip()
images = m.get('images', [])
if subset:
  want = set(x.strip() for x in subset.split(',') if x.strip())
  images = [i for i in images if i['name'] in want]
open(os.environ['GITHUB_OUTPUT'],'a').write("matrix="+json.dumps(images)+"\n")
PY
        env:
          SUBSET: ${{ inputs.subset }}

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: startsWith(needs.prepare.outputs.repo, 'docker.io/')
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          provenance: true
          tags: |
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}

      - name: Install Syft (SBOM)
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (spdx-json)
        run: |
          set -euo pipefail
          mkdir -p sbom
          syft ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }} -o spdx-json > sbom/${{ matrix.name }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom/${{ matrix.name }}.spdx.json

      - name: Install Trivy
        run: |
          set -euo pipefail
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: CVE gate (Trivy HIGH/CRITICAL)
        run: |
          set -euo pipefail
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed \
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}

      - name: Install cosign
        run: |
          set -euo pipefail
          COSIGN_VERSION="v2.2.4"
          curl -sSfL https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64 -o cosign
          chmod +x cosign && sudo mv cosign /usr/local/bin/

      - name: Sign container (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}

  summarize:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Builds complete."
