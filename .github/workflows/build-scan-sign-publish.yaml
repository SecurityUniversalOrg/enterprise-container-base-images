name: Build • Scan • Sign • Publish

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'matrix.yaml'
  pull_request:
    paths:
      - 'images/**'
      - 'matrix.yaml'
  workflow_dispatch:
    inputs:
      subset:
        description: "Comma-separated image names to build (optional; must match names in matrix.yaml)"
        required: false
        type: string
      repo:
        description: "Target registry repo prefix (default docker.io/<ns>)"
        required: false
        type: string
        default: "docker.io/${{ github.repository_owner }}"

permissions:
  contents: read
  id-token: write   # required for cosign keyless
  packages: read

env:
  # Build knobs
  DOCKERHUB_REGISTRY: docker.io
  # Cosign
  COSIGN_YES: "true"   # non-interactive confirmations

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve repo prefix
        id: repo
        run: |
          if [ -n "${{ inputs.repo }}" ]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          else
            # fallback to dockerhub + org/namespace from matrix.yaml
            ns=$(python3 - <<'PY'
import yaml
m=yaml.safe_load(open('matrix.yaml'))
print(m.get('dockerhub_namespace',''))
PY
)
            if [ -n "$ns" ]; then
              echo "repo=docker.io/$ns" >> "$GITHUB_OUTPUT"
            else
              echo "repo=docker.io/${{ github.repository_owner }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build matrix (optionally filter by subset)
        id: out
        run: |
          python3 - <<'PY'
import os, json, yaml
m = yaml.safe_load(open('matrix.yaml'))
subset = os.getenv('SUBSET','').strip()
images = m.get('images', [])
if subset:
  want = set(x.strip() for x in subset.split(',') if x.strip())
  images = [i for i in images if i['name'] in want]
print(f"matrix={json.dumps(images)}")
open(os.environ['GITHUB_OUTPUT'],'a').write("matrix="+json.dumps(images)+"\n")
PY
        env:
          SUBSET: ${{ inputs.subset || '' }}

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: startsWith(needs.prepare.outputs.repo, 'docker.io/')
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          provenance: true
          tags: |
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}

      - name: Install Syft (SBOM)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (spdx-json)
        run: |
          mkdir -p sbom
          syft ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }} -o spdx-json > sbom/${{ matrix.name }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom/${{ matrix.name }}.spdx.json

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: CVE gate (Trivy HIGH/CRITICAL)
        run: |
          trivy image --exit-code 1 --severity CRITICAL,HIGH --ignore-unfixed ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}

      - name: Install cosign
        run: |
          COSIGN_VERSION="v2.2.4"
          curl -sSfL https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64 -o cosign
          chmod +x cosign && sudo mv cosign /usr/local/bin/

      - name: Sign container (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}

  # Optional summary
  summarize:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: echo "Builds complete."
