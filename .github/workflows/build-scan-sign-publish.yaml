---
name: Build • Scan • Sign • Publish

on:
  workflow_dispatch:
    inputs:
      subset:
        description: >
          Comma-separated image names to build (optional; must match names
          in matrix.yaml)
        required: false
        type: string
        default: ""
      repo:
        description: >
          Target registry repo prefix, e.g. docker.io/kaiserbros
          (leave blank to auto-resolve)
        required: false
        type: string
        default: ""
  repository_dispatch:
    types:
      - base-images-updated

permissions:
  contents: read
  id-token: write
  packages: read

env:
  DOCKERHUB_REGISTRY: docker.io
  COSIGN_YES: "true"

jobs:
  prepare:
    runs-on: federal
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # or 0 for full history

      - name: Resolve repo prefix
        id: repo
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-resolve-repo-prefix@v1
        with:
          repo: ${{ inputs.repo }}

      - name: Determine matrix subset
        id: determinesubset
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-determine-matrix-subset@v1
        with:
          subset: ${{ inputs.subset }}

      - name: Build matrix (optionally filter by subset)
        id: matrix
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-create-image-matrix@v1
        with:
          subset: ${{ steps.determinesubset.outputs.subset }}

  build:
    needs: prepare
    runs-on: federal
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      old_tag: ${{ steps.oldtag.outputs.old_tag }}    
    steps:
      - uses: actions/checkout@v4

      - name: Get old docker tag
        id: oldtag
        uses: SecurityUniversalOrg/ghe-actions/actions/get-old-tag@v1
        with:
          image: ${{ github.event.client_payload.dockerhub_namespace }}/${{ matrix.name }}

      - name: Compute new docker tag
        id: tagcalc
        uses: SecurityUniversalOrg/ghe-actions/actions/get-new-docker-tag@v1
        with:
          image_repo: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}
          candidate_tag: ${{ matrix.tags[0] }}

      - name: Build to local daemon (single-arch)
        id: build
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-build-to-daemon@v1
        with:
          docker_repo: ${{ needs.prepare.outputs.repo }}
          image: ${{ matrix.name }}
          tag_primary: ${{ steps.tagcalc.outputs.new_tag }}
          tag_secondary: ${{ matrix.tags[1] }}
          dockerfile_path: ${{ matrix.path }}

      - name: Trivy vulnerability scanner CVE gate
        id: secscan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          timeout: 30m0s

      - name: Docker Hub login
        id: docker-login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote and push image
        id: promote
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-push-image@v1
        with:
          primary_ref: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}
          secondary_ref:  ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}

      - name: Resolve digest for primary tag
        id: digest
        uses: SecurityUniversalOrg/ghe-actions/actions/find-digest-for-primary-tag@v1
        with:
          primary_ref: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}

      - name: Sign image (keyless, by digest)
        id: sign-image
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-sign-image@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}
      
      - name: Generate SBOM (SPDX JSON)
        id: sbom
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-generate-sbom@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}

      - name: Attach SBOM attestation
        id: sbom-attach
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-attach-sbom@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}
          matrix_name: ${{ matrix.name }}
      
      - name: Emit update record
        if: ${{ success() }}
        id: update-emit
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-emit-update-record@v1
        with:
          primary_ref: ${{ steps.tagcalc.outputs.new_tag }}
          matrix_name: ${{ matrix.name }}

      - name: Determine dependent layers
        id: determine-dependents
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-find-dependent-layers@v1
        with:
          roots: ${{ matrix.name }}

      - name: Notify dependent layers
        id: notify-dependents
        uses: SecurityUniversalOrg/ghe-actions/actions/docker-notify-dependent-layers@v1
        with:
          gh_token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          subset_json: ${{ steps.determine-dependents.outputs.subset }}
          matrix_name: ${{ matrix.name }}
          old_tag: ${{ steps.oldtag.outputs.old_tag}}
          new_tag: ${{ steps.tagcalc.outputs.new_tag }}

  update-matrix:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Download all update artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updates-*
          merge-multiple: true
          path: updates

      # - name: Apply all updates to matrix.yaml
      #   shell: bash
