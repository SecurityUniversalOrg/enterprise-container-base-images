---
name: Build-Scan-Sign-Publish

on:
  workflow_dispatch:
    inputs:
      subset:
        description: >
          Comma-separated image names to build (optional; must match names
          in matrix.yaml)
        required: false
        type: string
        default: ""
      repo:
        description: >
          Target registry repo prefix, e.g. docker.io/kaiserbros
          (leave blank to auto-resolve)
        required: false
        type: string
        default: ""
  repository_dispatch:
    types:
      - base-images-updated

permissions:
  contents: read
  id-token: write
  packages: read

env:
  DOCKERHUB_REGISTRY: docker.io
  COSIGN_YES: "true"

jobs:
  prepare:
    runs-on: federal
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # or 0 for full history

      - name: Resolve repo prefix
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.repo }}" ]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.dockerhub_namespace }}" ]; then
            echo "repo=${{ github.event.client_payload.dockerhub_namespace }}" >> "$GITHUB_OUTPUT"
          else
            python3 ./scripts/resolve_repo_prefix.py >> "$GITHUB_OUTPUT"
          fi
          echo "Repo prefix from GITHUB_OUTPUT:"
          grep '^repo=' "$GITHUB_OUTPUT" | sed 's/^repo=//'

      - name: Determine matrix subset
        id: determinesubset
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.subset }}" ]; then
            echo "subset=${{ inputs.subset }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ toJson(github.event.client_payload.subset) }}" ]; then
            # Join the array into a comma-separated string
            echo "subset=${{ join(github.event.client_payload.subset, ',') }}" >> "$GITHUB_OUTPUT"
          else
            echo "No subset provided, using full matrix."
            echo "subset=${{ inputs.subset }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Debug GitHub Event: ${{ toJson(github.event) }}"
          echo "Subset value from GITHUB_OUTPUT:"
          grep '^subset=' "$GITHUB_OUTPUT" | sed 's/^subset=//'

      - name: Build matrix (optionally filter by subset)
        id: matrix
        shell: bash
        env:
          SUBSET: ${{ steps.determinesubset.outputs.subset }}
        run: |
          set -euo pipefail
          python3 ./scripts/build_matrix.py
          echo "Matrix from GITHUB_OUTPUT:"
          grep '^matrix=' "$GITHUB_OUTPUT" | sed 's/^matrix=//'

  build:
    needs: prepare
    runs-on: federal
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      old_tag: ${{ steps.oldtag.outputs.old_tag }}    
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute NEW_TAG (auto-increment .P<num>)
        id: tagcalc
        env:
          IMAGE_REPO: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}
          # matrix.tags[0] should be your monthly pattern like 24.04-2025.08 (no .P yet) or with .P — both are fine
          CANDIDATE_TAG: ${{ matrix.tags[0] }}
        shell: bash
        run: |
          set -euo pipefail

          cand="$CANDIDATE_TAG"

          # Extract base prefix (e.g., "24.04") and period (e.g., "2025.08") from CANDIDATE_TAG
          base="$(sed -E 's/-[0-9]{4}\.[0-9]{2}(\.P[0-9]+)?$//' <<< "$cand")"
          period="$(sed -E 's/^.*-([0-9]{4}\.[0-9]{2})(\.P[0-9]+)?$/\1/' <<< "$cand")"
          prefix="${base}-${period}"

          # Find latest matching tag in the registry for this base+period, exclude cosign attachments
          latest="$(skopeo list-tags "docker://${IMAGE_REPO}" \
            | jq -r '.Tags[]' \
            | grep -E "^${prefix}(\.P[0-9]+)?$" \
            | grep -Ev '(^sha256-|\.sig$|\.att$|\.sbom$)' \
            | sort -V | tail -n 1 || true)"

          if [[ "$latest" =~ \.P([0-9]+)$ ]]; then
            next=$(( ${BASH_REMATCH[1]} + 1 ))
          else
            next=1
          fi

          NEW_TAG="${prefix}.P${next}"
          echo "NEW_TAG=${NEW_TAG}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "base_prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "period=${period}" >> "$GITHUB_OUTPUT"  

      - name: Build to local daemon (single-arch)
        id: build
        run: |
          set -euo pipefail

          REPO="${{ needs.prepare.outputs.repo }}"
          NAME="${{ matrix.name }}"
          TAG_PRIMARY="${{ steps.tagcalc.outputs.new_tag }}"
          TAG_SECONDARY="${{ matrix.tags[1] }}"

          # Build (single-arch, loaded into local daemon)
          docker buildx build \
            --platform linux/amd64 \
            --build-arg DATE_TAG='${{ matrix.date_tag }}' \
            -t "${REPO}/${NAME}:${TAG_PRIMARY}" \
            -t "${REPO}/${NAME}:${TAG_SECONDARY}" \
            --load \
            -f "${{ matrix.path }}/Dockerfile" \
            .

          # Compute outputs
          # "image_ref" -> primary tag; "image_name" -> repository/name
          echo "image_ref=${REPO}/${NAME}:${TAG_PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "image_name=${REPO}/${NAME}" >> "$GITHUB_OUTPUT"
          # (optionally expose both tags)
          echo "image_tags=${TAG_PRIMARY},${TAG_SECONDARY}" >> "$GITHUB_OUTPUT"
          SBOM_PATH="${REPO//\//-}-${NAME}"
          echo "sbom_path=${SBOM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scanner CVE gate
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'  

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote and push image
        id: promote
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}"
          docker push "${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}"

      - name: Resolve digest for primary tag
        id: digest
        shell: bash
        env:
          REF: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}
        run: |
          set -euo pipefail
          # Use skopeo to read the pushed tag’s manifest digest from the registry
          DIGEST=$(skopeo inspect "docker://${REF}" | jq -r .Digest)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "full_ref=${REF%@*}@${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${REF} -> ${DIGEST}"

      - name: Sign image (keyless, by digest)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign "${{ steps.digest.outputs.full_ref }}"

      - name: Generate SBOM (SPDX JSON)
        run: |
          set -euo pipefail
          # After you’ve resolved DIGEST for the pushed image:
          FULL_REF="${{ steps.digest.outputs.full_ref }}"

          # Generate SBOM tied to the digest
          syft "registry:${FULL_REF}" -o spdx-json > sbom.spdx.json

          # Attach it
          COSIGN_EXPERIMENTAL=true cosign attest --type spdx --predicate sbom.spdx.json "${FULL_REF}"


      - name: Attach SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign attest \
            --type spdx \
            --predicate sbom.spdx.json \
            "${{ steps.digest.outputs.full_ref }}"

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom.spdx.json

      - name: Get old tag from registry
        id: oldtag
        env:
            IMAGE_NAME: ${{ github.event.client_payload.dockerhub_namespace }}/${{ matrix.name }}   # adjust as needed
        run: |
            set -euo pipefail
            # Get all tags, exclude cosign artifacts, sort, and take the latest
            old_tag=$(skopeo list-tags "docker://${IMAGE_NAME}" \
            | jq -r '.Tags[]' \
            | grep -E '^[0-9]{2}\.[0-9]{2}-[0-9]{4}\.[0-9]{2}(\.P[0-9]+)?$' \
            | sort -V \
            | tail -n 1)

            echo "Old tag is: $old_tag"
            echo "old_tag=$old_tag" >> "$GITHUB_OUTPUT"

      - name: Determine dependent layers
        id: determine-dependents
        env:
          ROOTS: ${{ matrix.name }}
          FULL_REBUILD: false
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Computing cascade subset with roots: '${ROOTS}'"
          python3 -s scripts/find_dependencies.py
          echo "Need to rebuild:"
          grep '^subset=' "$GITHUB_OUTPUT" | sed 's/^subset=//'

      - name: Notify dependent layers
        id: notify-dependents
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}   # PAT or GitHub App token scoped to the *updater repo*
          REPO:  ${{ github.repository }}          # target repo (Workflow B lives here)
          SUBSET_JSON: ${{ steps.determine-dependents.outputs.subset }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(jq -n \
            --arg event "update-dependent-dockerfiles" \
            --arg base  "${{ matrix.name }}" \
            --arg old   "${{ steps.oldtag.outputs.old_tag}}" \
            --arg new   "${{ steps.tagcalc.outputs.new_tag }}" \
            --arg reg   "${{ github.event.client_payload.dockerhub_namespace }}" \
            --argjson subset "${SUBSET_JSON}" \
            '{event_type:$event, client_payload:{base_name:$base, old_tag:$old, new_tag:$new, reg_prefix:$reg, subset:$subset}}')
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/${REPO}/dispatches \
            -d "${BODY}"

  update-matrix:
    needs: build
    if: ${{ always() && needs.build.result == 'success' }}   # only if build was successful
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update matrix.yaml with new tag
        id: bump
        env:
          IMG_NAME: ${{ matrix.name }}
          NEW_TAG:  ${{ needs.build.outputs.image_tags && fromJson(format('["{0}"]', needs.build.outputs.image_tags))[0] || steps.tagcalc.outputs.new_tag }}
          # Prefer the computed new_tag; fallback shown for safety
          COMPUTED_NEW_TAG: ${{ needs.build.outputs.image_tags }}
        run: |
          set -euo pipefail
          # Prefer the tag from tagcalc (job boundary means we re-derive from needs if necessary)
          NEW_TAG="${{ needs.build.outputs.old_tag }}"  # dummy read to satisfy parser; we set real NEW_TAG below
          NEW_TAG="${{ steps.tagcalc.outputs.new_tag || '' }}"
          if [ -z "$NEW_TAG" ]; then
            # fallback: first of image_tags output if you exported it, else fail
            NEW_TAG="${{ steps.build.outputs.image_ref }}" 
            NEW_TAG="${NEW_TAG##*:}"
          fi
          echo "Will set tags[0] for ${IMG_NAME} to ${NEW_TAG}"

          # Update tags[0] for the matching image; keep tags[1] (e.g., latest) unchanged.
          yq -i '
            (.images[] | select(.name == env(IMG_NAME)) .tags[0]) = env(NEW_TAG)
          ' matrix.yaml

          # Optional: also ensure date_tag aligns with the period we built against
          if [ -n "${{ steps.tagcalc.outputs.period }}" ]; then
            yq -i '
              (.images[] | select(.name == env(IMG_NAME)) .date_tag) = "${{ steps.tagcalc.outputs.period }}"
            ' matrix.yaml
          fi

          echo "Changed matrix.yaml:"
          git diff -- matrix.yaml || true

      - name: Commit and PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMG_NAME: ${{ matrix.name }}
          NEW_TAG:  ${{ steps.tagcalc.outputs.new_tag }}
        run: |
          set -euo pipefail
          BR="chore/matrix-${IMG_NAME}-${NEW_TAG}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add matrix.yaml
          git commit -m "chore(matrix): set ${IMG_NAME} primary tag to ${NEW_TAG}"
          git push -u origin "$BR"

          # Determine base branch
          BASE_BRANCH="$(git remote show origin | awk '/HEAD branch/ {print $NF}')"
          [ -n "$BASE_BRANCH" ] || BASE_BRANCH="main"

          gh pr create \
            --title "Update matrix: ${IMG_NAME} → ${NEW_TAG}" \
            --body  "Automated bump of matrix.yaml primary tag for \`${IMG_NAME}\` to \`${NEW_TAG}\` after successful build." \
            --base "$BASE_BRANCH" \
            --head "$BR"


  summarize:
    needs: [prepare, build]
    runs-on: federal
    steps:
      - run: echo "Builds complete."
