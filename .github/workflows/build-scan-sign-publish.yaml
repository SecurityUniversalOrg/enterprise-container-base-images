---
name: Build-Scan-Sign-Publish

on:
  push:
    branches: [main]
    paths:
      - images/**
      - matrix.yaml
  pull_request:
    paths:
      - images/**
      - matrix.yaml
  workflow_dispatch:
    inputs:
      subset:
        description: >
          Comma-separated image names to build (optional; must match names
          in matrix.yaml)
        required: false
        type: string
        default: ""
      repo:
        description: >
          Target registry repo prefix, e.g. docker.io/kaiserbros
          (leave blank to auto-resolve)
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write
  packages: read

env:
  DOCKERHUB_REGISTRY: docker.io
  COSIGN_YES: "true"

jobs:
  prepare:
    runs-on: federal
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve repo prefix
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.repo }}" ]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          else
            python3 -c 'import yaml,os,sys; m=yaml.safe_load(open("matrix.yaml")); ns=m.get("dockerhub_namespace"); owner=os.environ.get("GITHUB_REPOSITORY_OWNER",""); repo=f"docker.io/{ns}" if ns else f"docker.io/{owner}"; print(f"repo={repo}")' >> "$GITHUB_OUTPUT"
          fi

      - name: Build matrix (optionally filter by subset)
        id: matrix
        shell: bash
        env:
          SUBSET: ${{ inputs.subset }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, json, yaml
          m = yaml.safe_load(open('matrix.yaml'))
          subset = os.getenv('SUBSET','').strip()
          images = m.get('images', [])
          if subset:
            wanted = {x.strip() for x in subset.split(',') if x.strip()}
            images = [i for i in images if i.get('name') in wanted]
          open(os.environ['GITHUB_OUTPUT'],'a').write("matrix="+json.dumps(images)+"\n")
          PY

  build:
    needs: prepare
    runs-on: federal
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build to local daemon (single-arch)
        id: build
        run: |
          set -euo pipefail

          REPO="${{ needs.prepare.outputs.repo }}"
          NAME="${{ matrix.name }}"
          TAG_PRIMARY="${{ matrix.tags[0] }}"
          TAG_SECONDARY="${{ matrix.tags[1] }}"

          # Build (single-arch, loaded into local daemon)
          docker buildx build \
            --platform linux/amd64 \
            --build-arg DATE_TAG='${{ matrix.date_tag }}' \
            -t "${REPO}/${NAME}:${TAG_PRIMARY}" \
            -t "${REPO}/${NAME}:${TAG_SECONDARY}" \
            --load \
            -f "${{ matrix.path }}/Dockerfile" \
            .

          # Compute outputs
          # "image_ref" -> primary tag; "image_name" -> repository/name
          echo "image_ref=${REPO}/${NAME}:${TAG_PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "image_name=${REPO}/${NAME}" >> "$GITHUB_OUTPUT"
          # (optionally expose both tags)
          echo "image_tags=${TAG_PRIMARY},${TAG_SECONDARY}" >> "$GITHUB_OUTPUT"
          SBOM_PATH="${REPO//\//-}-${NAME}"
          echo "sbom_path=${SBOM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Trivy vulnerability scanner CVE gate
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'  

      - name: Promote and push image
        id: promote
        shell: bash
        run: |
          docker push \
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}
          docker push \
            ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}


    #   - name: Install cosign
    #     shell: bash
    #     run: |
    #       set -euo pipefail
    #       COSIGN_VERSION="v2.2.4"
    #       curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
    #         -o cosign
    #       chmod +x cosign && sudo mv cosign /usr/local/bin/

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.build.outputs.image_ref }}
          format: spdx-json
          artifact-name: sbom-${{ steps.build.outputs.sbom_path }}


      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom/${{ matrix.name }}.spdx.json
      
      - name: Sign container
        env:
          COSIGN_EXPERIMENTAL: "true"
        shell: bash
        run: |
          set -euo pipefail
          cosign sign "${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}"

    #   - name: Login to Docker Hub
    #     if: startsWith(needs.prepare.outputs.repo, 'docker.io/')
    #     uses: docker/login-action@v3
    #     with:
    #       registry: docker.io
    #       username: ${{ secrets.DOCKERHUB_USERNAME }}
    #       password: ${{ secrets.DOCKERHUB_TOKEN }}

    #   - name: Publish container
    #     run: |
    #       docker push "${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[0] }}"
    #       docker push "${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}"

  summarize:
    needs: [prepare, build]
    runs-on: federal
    steps:
      - run: echo "Builds complete."
