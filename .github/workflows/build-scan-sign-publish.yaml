---
name: Build-Scan-Sign-Publish

on:
  workflow_dispatch:
    inputs:
      subset:
        description: >
          Comma-separated image names to build (optional; must match names
          in matrix.yaml)
        required: false
        type: string
        default: ""
      repo:
        description: >
          Target registry repo prefix, e.g. docker.io/kaiserbros
          (leave blank to auto-resolve)
        required: false
        type: string
        default: ""
  repository_dispatch:
    types:
      - base-images-updated

permissions:
  contents: read
  id-token: write
  packages: read

env:
  DOCKERHUB_REGISTRY: docker.io
  COSIGN_YES: "true"

jobs:
  prepare:
    runs-on: federal
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      repo: ${{ steps.repo.outputs.repo }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # or 0 for full history

      - name: Resolve repo prefix
        id: repo
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.repo }}" ]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.client_payload.dockerhub_namespace }}" ]; then
            echo "repo=${{ github.event.client_payload.dockerhub_namespace }}" >> "$GITHUB_OUTPUT"
          else
            python3 ./scripts/resolve_repo_prefix.py >> "$GITHUB_OUTPUT"
          fi
          echo "Repo prefix from GITHUB_OUTPUT:"
          grep '^repo=' "$GITHUB_OUTPUT" | sed 's/^repo=//'

      - name: Determine matrix subset
        id: determinesubset
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.subset }}" ]; then
            echo "subset=${{ inputs.subset }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ toJson(github.event.client_payload.subset) }}" ]; then
            # Join the array into a comma-separated string
            echo "subset=${{ join(github.event.client_payload.subset, ',') }}" >> "$GITHUB_OUTPUT"
          else
            echo "No subset provided, using full matrix."
            echo "subset=${{ inputs.subset }}" >> "$GITHUB_OUTPUT"
          fi
          echo "Debug GitHub Event: ${{ toJson(github.event) }}"
          echo "Subset value from GITHUB_OUTPUT:"
          grep '^subset=' "$GITHUB_OUTPUT" | sed 's/^subset=//'

      - name: Build matrix (optionally filter by subset)
        id: matrix
        shell: bash
        env:
          SUBSET: ${{ steps.determinesubset.outputs.subset }}
        run: |
          set -euo pipefail
          python3 ./scripts/build_matrix.py
          echo "Matrix from GITHUB_OUTPUT:"
          grep '^matrix=' "$GITHUB_OUTPUT" | sed 's/^matrix=//'

  build:
    needs: prepare
    runs-on: federal
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    outputs:
      old_tag: ${{ steps.oldtag.outputs.old_tag }}    
    steps:
      - uses: actions/checkout@v4

      - name: Get old docker tag
        id: oldtag
        uses: SecurityUniversalOrg/platform-actions/actions/get-old-tag@v1
        with:
          image: ${{ github.event.client_payload.dockerhub_namespace }}/${{ matrix.name }}

      - name: Compute new docker tag
        id: tagcalc
        uses: SecurityUniversalOrg/platform-actions/actions/get-new-docker-tag@v1
        with:
          image_repo: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}
          candidate_tag: ${{ matrix.tags[0] }}

      - name: Build to local daemon (single-arch)
        id: build
        uses: SecurityUniversalOrg/platform-actions/actions/docker-build-to-daemon@v1
        with:
          docker_repo: ${{ needs.prepare.outputs.repo }}
          image: ${{ matrix.name }}
          tag_primary: ${{ steps.tagcalc.outputs.new_tag }}
          tag_secondary: ${{ matrix.tags[1] }}
          dockerfile_path: ${{ matrix.path }}

      - name: Trivy vulnerability scanner CVE gate
        id: secscan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'  

      - name: Docker Hub login
        id: docker-login
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Promote and push image
        id: promote
        uses: SecurityUniversalOrg/platform-actions/actions/docker-push-image@v1
        with:
          primary_ref: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}
          secondary_ref:  ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ matrix.tags[1] }}

      - name: Resolve digest for primary tag
        id: digest
        uses: SecurityUniversalOrg/platform-actions/actions/find-digest-for-primary-tag@v1
        with:
          primary_ref: ${{ needs.prepare.outputs.repo }}/${{ matrix.name }}:${{ steps.tagcalc.outputs.new_tag }}

      - name: Sign image (keyless, by digest)
        id: sign-image
        uses: SecurityUniversalOrg/platform-actions/actions/docker-sign-image@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}
      
      - name: Generate SBOM (SPDX JSON)
        id: sbom
        uses: SecurityUniversalOrg/platform-actions/actions/docker-generate-sbom@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}

      - name: Attach SBOM attestation
        id: sbom-attach
        uses: SecurityUniversalOrg/platform-actions/actions/docker-attach-sbom@v1
        with:
          primary_ref: ${{ steps.digest.outputs.full_ref }}
          matrix_name: ${{ matrix.name }}

      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: sbom-${{ matrix.name }}
      #     path: sbom.spdx.json
      
      - name: Emit update record
        if: ${{ success() }}
        id: update-emit
        uses: SecurityUniversalOrg/platform-actions/actions/docker-emit-update-record@v1
        with:
          primary_ref: ${{ steps.tagcalc.outputs.new_tag }}
          matrix_name: ${{ matrix.name }}

      # - name: Determine dependent layers
      #   id: determine-dependents
      #   env:
      #     ROOTS: ${{ matrix.name }}
      #     FULL_REBUILD: false
      #     EVENT_NAME: ${{ github.event_name }}
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     echo "Computing cascade subset with roots: '${ROOTS}'"
      #     python3 -s scripts/find_dependencies.py
      #     echo "Need to rebuild:"
      #     grep '^subset=' "$GITHUB_OUTPUT" | sed 's/^subset=//'

      - name: Determine dependent layers
        id: determine-dependents
        uses: SecurityUniversalOrg/platform-actions/actions/docker-find-dependent-layers@v1
        with:
          roots: ${{ matrix.name }}

      - name: Notify dependent layers
        id: notify-dependents
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}   # PAT or GitHub App token scoped to the *updater repo*
          REPO:  ${{ github.repository }}          # target repo (Workflow B lives here)
          SUBSET_JSON: ${{ steps.determine-dependents.outputs.subset }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(jq -n \
            --arg event "update-dependent-dockerfiles" \
            --arg base  "${{ matrix.name }}" \
            --arg old   "${{ steps.oldtag.outputs.old_tag}}" \
            --arg new   "${{ steps.tagcalc.outputs.new_tag }}" \
            --arg reg   "${{ github.event.client_payload.dockerhub_namespace }}" \
            --argjson subset "${SUBSET_JSON}" \
            '{event_type:$event, client_payload:{base_name:$base, old_tag:$old, new_tag:$new, reg_prefix:$reg, subset:$subset}}')
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            https://api.github.com/repos/${REPO}/dispatches \
            -d "${BODY}"

  update-matrix:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Download all update artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updates-*
          merge-multiple: true
          path: updates

      - name: Apply all updates to matrix.yaml
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          found=0
          for f in updates/update-*.json; do
            NAME_VAL=$(jq -r .name < "$f")
            TAG_VAL=$(jq -r .new_tag < "$f")

            if [[ -z "$NAME_VAL" || -z "$TAG_VAL" || "$NAME_VAL" == "null" || "$TAG_VAL" == "null" ]]; then
              echo "Skipping $f (empty or null name/tag)"
              continue
            fi

            echo "Updating $NAME_VAL -> $TAG_VAL"
            found=1

            # Export env vars for yq env()
            NAME="$NAME_VAL" TAG="$TAG_VAL" yq -i '
              (.images[] | select(.name == env(NAME)) .tags[0]) = env(TAG)
            ' matrix.yaml
          done

          if [[ $found -eq 0 ]]; then
            echo "No updates found; exiting without changes."
            exit 0
          fi

          echo "Preview changes:"; git diff -- matrix.yaml || true

      - name: Commit & open PR (one PR for all)
        env:
          GH_TOKEN: ${{ secrets.DEPENDENT_REPO_RW_TOKEN }}
        run: |
          set -euo pipefail
          BR="chore/matrix-bump-$(date -u +%Y%m%d%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BR"
          git add matrix.yaml
          if git diff --cached --quiet; then
            echo "No matrix changes; skipping PR."
            exit 0
          fi
          git commit -m "chore(matrix): bump primary tags after successful builds"
          git push -u origin "$BR"
          BASE_BRANCH="$(git remote show origin | awk '/HEAD branch/ {print $NF}')"
          [ -n "$BASE_BRANCH" ] || BASE_BRANCH="main"
          gh pr create \
            --title "Update matrix: bump primary tags" \
            --body  "Automated bump of primary tags for images built successfully." \
            --base "$BASE_BRANCH" --head "$BR"


  summarize:
    needs: [prepare, build]
    runs-on: federal
    steps:
      - run: echo "Builds complete."
