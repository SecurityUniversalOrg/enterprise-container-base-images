---
name: Cascade Rebuilds

on:
  push:
    branches: [main]
    paths:
      - images/**
      - dependency-graph.yaml
      - matrix.yaml
  schedule:
    - cron: "0 6 1 * *" # monthly, 06:00 UTC on the 1st
  workflow_dispatch:
    inputs:
      roots:
        description: "Comma-separated root image names to start cascade from (optional)"
        required: false
        type: string
      full_rebuild:
        description: "Rebuild ALL images (ignore roots)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      subset: ${{ steps.compute.outputs.subset }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute cascade subset
        id: compute
        env:
          ROOTS: ${{ inputs.roots }}
          FULL_REBUILD: ${{ inputs.full_rebuild }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, yaml, json, subprocess, collections

          # Load dependency graph and matrix
          with open('dependency-graph.yaml', 'r') as f:
              dep = yaml.safe_load(f) or {}
          with open('matrix.yaml', 'r') as f:
              mat = yaml.safe_load(f) or {}

          images = mat.get('images', []) or []
          all_names = {i['name'] for i in images if 'name' in i}

          def changed_roots_from_git():
              try:
                  out = subprocess.check_output(
                      ["git", "diff", "--name-only", "HEAD~1..HEAD"],
                      text=True
                  )
              except Exception:
                  return set()
              roots = set()
              for line in out.splitlines():
                  parts = line.strip().split('/')
                  # expects images/<category>/<name>/...
                  if len(parts) >= 3 and parts[0] == "images":
                      candidate = f"{parts[1]}-{parts[2]}".replace('_', '-')
                      if candidate in all_names:
                          roots.add(candidate)
              return roots

          def walk(roots, graph):
              seen = set()
              stack = list(roots)
              while stack:
                  n = stack.pop()
                  if n in seen:
                      continue
                  seen.add(n)
                  for c in (graph.get(n) or []):
                      stack.append(c)
              return seen

          roots_in = (os.getenv('ROOTS') or '').strip()
          full = (os.getenv('FULL_REBUILD') or 'false').lower() == 'true'
          schedule_event = (os.getenv('EVENT_NAME') == 'schedule')

          selected = set()
          if full or schedule_event:
              selected = all_names
          else:
              if roots_in:
                  roots = {x.strip() for x in roots_in.split(',') if x.strip()}
              else:
                  roots = changed_roots_from_git()

              if roots:
                  selected = walk(roots, dep)
              else:
                  selected = set()

          # Keep original matrix entries but filtered by name
          matrix_subset = [i for i in images if i.get('name') in selected]
          # Output only the list of names as the job output
          names_subset = [i['name'] for i in matrix_subset]

          # Write to GITHUB_OUTPUT
          with open(os.environ['GITHUB_OUTPUT'], 'a') as gh:
              gh.write("subset=" + json.dumps(names_subset) + "\n")
          PY

  rebuild_here:
    needs: plan
    if: needs.plan.outputs.subset != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch local build (subset)
        uses: peter-evans/workflow-dispatch@v3
        with:
            token: ${{ secrets.SELF_DISPATCH_TOKEN }}
            repository: ${{ github.repository }}       # or <org>/<repo> if different
            workflow: build-scan-sign-publish.yml      # file name OR exact workflow name
            ref: main
            inputs:
            subset: ${{ join(fromJson(needs.plan.outputs.subset), ',') }}


  notify_downstream:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load downstream map (optional)
        id: map
        shell: bash
        run: |
          if [ -f ".downstreams.yaml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit repository_dispatch to downstreams
        if: steps.map.outputs.present == 'true' && needs.plan.outputs.subset != '[]'
        uses: actions/github-script@v7
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
          SUBSET: ${{ needs.plan.outputs.subset }}
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            const subset = JSON.parse(process.env.SUBSET);
            const hasFile = fs.existsSync('.downstreams.yaml');
            if (!hasFile) {
              core.info("No .downstreams.yaml found.");
              return;
            }
            const doc = yaml.load(fs.readFileSync('.downstreams.yaml','utf8')) || {};

            // .downstreams.yaml example:
            // runners:
            //   repo: "your-enterprise-org/platform-arc-runner-images"
            //   mapping:
            //     base-ubuntu: ["iac-aws","iac-azure","iac-gcp","container-build-aws","container-build-azure","container-build-gcp","k8s-deploy-aws","k8s-deploy-azure","k8s-deploy-gcp","sec-scan"]
            //     lang-java-jdk: ["lang-java"]
            //     lang-python: ["lang-python"]
            //     lang-node: ["lang-node"]
            //     lang-dotnet-sdk: ["lang-dotnet"]
            //     lang-go: ["lang-go"]

            const targets = [];
            if (doc.runners && doc.runners.repo && doc.runners.mapping) {
              const agg = new Set();
              for (const base of subset) {
                const mapped = doc.runners.mapping[base];
                if (Array.isArray(mapped)) {
                  for (const m of mapped) agg.add(m);
                }
              }
              if (agg.size > 0) {
                targets.push({
                  repo: doc.runners.repo,
                  subset: Array.from(agg)
                });
              }
            }

            if (targets.length === 0) {
              core.info("No downstream targets resolved. Skipping.");
              return;
            }

            const token = process.env.TOKEN;
            if (!token) {
              core.setFailed("REPO_DISPATCH_TOKEN not configured.");
              return;
            }

            const octokit = github.getOctokit(token);
            for (const t of targets) {
              core.info(`Dispatching to ${t.repo} with subset ${t.subset.join(",")}`);
              await octokit.rest.repos.createDispatchEvent({
                owner: t.repo.split('/')[0],
                repo: t.repo.split('/')[1],
                event_type: "base-images-updated",
                client_payload: {
                  date_tag: "2025.08",
                  dockerhub_namespace: "${{ github.repository_owner }}",
                  subset: t.subset.join(',')
                }
              });
            }
