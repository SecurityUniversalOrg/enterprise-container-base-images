---
name: Cascade Rebuilds

on:
  push:
    branches: [main]
    paths:
      - images/**
      - dependency-graph.yaml
      - matrix.yaml
  schedule:
    - cron: "0 6 1 * *" # monthly, 06:00 UTC on the 1st
  workflow_dispatch:
    inputs:
      roots:
        description: "Comma-separated root image names to start cascade from (optional)"
        required: false
        type: string
      full_rebuild:
        description: "Rebuild ALL images (ignore roots)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      subset: ${{ steps.compute.outputs.subset }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # or 0 for full history

      - name: Compute cascade subset
        id: compute
        env:
          ROOTS: ${{ inputs.roots }}
          FULL_REBUILD: ${{ inputs.full_rebuild }}
          EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Computing cascade subset with roots: '${{ inputs.roots }}' and full_rebuild=${{ inputs.full_rebuild }}"
          python3 -s scripts/compute_cascade_subset.py
          echo "Subset from GITHUB_OUTPUT:"
          grep '^subset=' "$GITHUB_OUTPUT" | sed 's/^subset=//'

  rebuild_here:
    needs: plan
    if: needs.plan.outputs.subset != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Repository dispatch via API
        env:
            DISPATCH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
            # Pass the matrix subset (JSON array string like ["base-ubuntu", ...])
            SUBSET_JSON: ${{ needs.plan.outputs.subset }}
        shell: bash
        run: |
            set -euo pipefail

            # Fallback to empty JSON array if unset/empty to satisfy set -u and jq --argjson
            : "${SUBSET_JSON:='[]'}"

            # (ubuntu-latest already has jq; install only if missing)
            command -v jq >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y jq; }

            BODY=$(jq -n \
            --arg event "base-images-updated" \
            --arg ns "docker.io/securityuniversal" \
            --argjson subset "${SUBSET_JSON}" \
            '{event_type:$event, client_payload:{dockerhub_namespace:$ns, subset:$subset}}')

            curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "User-Agent: repo-dispatch" \
            https://api.github.com/repos/SecurityUniversalOrg/platform-container-base-images/dispatches \
            -d "${BODY}"

  notify_downstream:
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load downstream map (optional)
        id: map
        shell: bash
        run: |
          if [ -f ".downstreams.yaml" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Emit repository_dispatch to downstreams
        if: steps.map.outputs.present == 'true' && needs.plan.outputs.subset != '[]'
        uses: actions/github-script@v7
        env:
          TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}
          SUBSET: ${{ needs.plan.outputs.subset }}
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            const subset = JSON.parse(process.env.SUBSET);
            const hasFile = fs.existsSync('.downstreams.yaml');
            if (!hasFile) {
              core.info("No .downstreams.yaml found.");
              return;
            }
            const doc = yaml.load(fs.readFileSync('.downstreams.yaml','utf8')) || {};

            // .downstreams.yaml example:
            // runners:
            //   repo: "your-enterprise-org/platform-arc-runner-images"
            //   mapping:
            //     base-ubuntu: ["iac-aws","iac-azure","iac-gcp","container-build-aws","container-build-azure","container-build-gcp","k8s-deploy-aws","k8s-deploy-azure","k8s-deploy-gcp","sec-scan"]
            //     lang-java-jdk: ["lang-java"]
            //     lang-python: ["lang-python"]
            //     lang-node: ["lang-node"]
            //     lang-dotnet-sdk: ["lang-dotnet"]
            //     lang-go: ["lang-go"]

            const targets = [];
            if (doc.runners && doc.runners.repo && doc.runners.mapping) {
              const agg = new Set();
              for (const base of subset) {
                const mapped = doc.runners.mapping[base];
                if (Array.isArray(mapped)) {
                  for (const m of mapped) agg.add(m);
                }
              }
              if (agg.size > 0) {
                targets.push({
                  repo: doc.runners.repo,
                  subset: Array.from(agg)
                });
              }
            }

            if (targets.length === 0) {
              core.info("No downstream targets resolved. Skipping.");
              return;
            }

            const token = process.env.TOKEN;
            if (!token) {
              core.setFailed("REPO_DISPATCH_TOKEN not configured.");
              return;
            }

            const octokit = github.getOctokit(token);
            for (const t of targets) {
              core.info(`Dispatching to ${t.repo} with subset ${t.subset.join(",")}`);
              await octokit.rest.repos.createDispatchEvent({
                owner: t.repo.split('/')[0],
                repo: t.repo.split('/')[1],
                event_type: "base-images-updated",
                client_payload: {
                  date_tag: "2025.08",
                  dockerhub_namespace: "${{ github.repository_owner }}",
                  subset: t.subset.join(',')
                }
              });
            }
